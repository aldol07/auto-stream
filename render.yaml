# Render Blueprint: API (web service) + static frontend (two deployments).
# After connect: 1) Set GEMINI_API_KEY on the API. 2) Deploy API, copy its public URL.
# 3) On the static site, set VITE_API_BASE to that API URL. 4) On the API, set
#    CORS_ORIGINS to your static site URL. Redeploy if needed.
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: autostream-api
    runtime: python
    plan: free
    region: oregon
    # Repo root must include the `backend/` package. Leave "Root Directory" empty in Render.
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    # Must invoke with `python` — not `render_entry.py` alone (Render would run it as a shell command).
    startCommand: python backend/render_entry.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
        # Set to your static site origin, e.g. https://autostream-web.onrender.com
        # (no trailing path). You can add multiple comma-separated URLs.

  - type: web
    name: autostream-web
    runtime: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE
        sync: false
        # Set to your API origin, e.g. https://autostream-api.onrender.com (no trailing slash)
